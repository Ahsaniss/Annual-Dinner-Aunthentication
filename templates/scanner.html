{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="text-center mb-4">Gate: <span class="badge bg-primary">{{ gate_type }}</span></h2>

        <div class="scanner-container">
            <div id="reader"></div>
        </div>

        <div id="result-box" class="result-box">
            <h3 id="result-title"></h3>
            <p id="result-message"></p>
            <div id="student-details" style="display:none;">
                <p><strong>Name:</strong> <span id="student-name"></span></p>
                <p><strong>Reg No:</strong> <span id="student-reg"></span></p>
                <p><strong>Dept:</strong> <span id="student-dept"></span></p>
            </div>
        </div>

        <div class="text-center mt-3">
            <button id="resume-btn" class="btn btn-primary px-4 py-2 fw-bold" style="display:none;">Scan Next</button>
        </div>

        <div class="mt-5">
            <h5 class="fw-bold mb-3 d-flex align-items-center">
                <i class="bi bi-clock-history me-2"></i> Recent Scans
            </h5>
            <div id="recent-scans" class="list-group shadow-sm">
                <!-- Recent scans will appear here -->
                <div class="list-group-item text-center text-muted py-3 small" id="no-scans-msg">
                    No scans in this session yet.
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const gateType = "{{ gate_type }}";
    const resultBox = document.getElementById('result-box');
    const resultTitle = document.getElementById('result-title');
    const resultMessage = document.getElementById('result-message');
    const studentDetails = document.getElementById('student-details');
    const resumeBtn = document.getElementById('resume-btn');

    let isScanning = true;
    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", { fps: 10, qrbox: 250 });

    function onScanSuccess(decodedText, decodedResult) {
        if (!isScanning) return;
        isScanning = false;

        // Stop scanning temporarily
        html5QrcodeScanner.clear();

        // Send to backend
        fetch('/api/verify', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                ticket_id: decodedText,
                gate_type: gateType
            }),
        })
            .then(response => response.json())
            .then(data => {
                showResult(data);
            })
            .catch((error) => {
                console.error('Error:', error);
                showResult({ status: 'error', message: 'Network or Server Error' });
            });
    }

    function showResult(data) {
        resultBox.style.display = 'block';
        studentDetails.style.display = 'none';
        resumeBtn.style.display = 'inline-block';

        resultBox.className = 'result-box'; // Reset classes

        if (data.status === 'valid') {
            resultBox.classList.add('result-success');
            resultTitle.innerText = 'ACCESS GRANTED';
            resultMessage.innerText = data.message || 'Verified Successfully';
            if (data.student) {
                studentDetails.style.display = 'block';
                document.getElementById('student-name').innerText = data.student.name;
                document.getElementById('student-reg').innerText = data.student.reg_no;
                document.getElementById('student-dept').innerText = data.student.dept;

                // Add to recent scans
                addToRecentScans(data.student.name, data.student.reg_no, 'success');
            }
        } else if (data.status === 'already_used') {
            resultBox.classList.add('result-warning');
            resultTitle.innerText = 'ALREADY ENTERED';
            resultMessage.innerText = `Checked in at: ${data.entry_time}`;
            addToRecentScans('Unknown', 'Duplicate', 'warning');
        } else if (data.status === 'invalid') {
            resultBox.classList.add('result-error');
            resultTitle.innerText = 'INVALID TICKET';
            resultMessage.innerText = 'Ticket ID not found in system.';
            addToRecentScans('Unknown', 'Invalid', 'error');
        } else {
            resultBox.classList.add('result-error');
            resultTitle.innerText = 'ERROR';
            resultMessage.innerText = data.message;
        }
    }

    function addToRecentScans(name, reg, type) {
        const list = document.getElementById('recent-scans');
        const noScansMsg = document.getElementById('no-scans-msg');
        if (noScansMsg) noScansMsg.remove();

        const item = document.createElement('div');
        item.className = 'list-group-item d-flex justify-content-between align-items-center animate-fade-in';

        let badgeClass = 'bg-success';
        if (type === 'warning') badgeClass = 'bg-warning text-dark';
        if (type === 'error') badgeClass = 'bg-danger';

        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        item.innerHTML = `
            <div>
                <div class="fw-bold">${name}</div>
                <small class="text-muted">${reg}</small>
            </div>
            <div class="text-end">
                <span class="badge ${badgeClass} mb-1">${type.toUpperCase()}</span>
                <div class="small text-muted">${time}</div>
            </div>
        `;

        list.prepend(item);

        // Keep only last 10
        if (list.children.length > 10) {
            list.removeChild(list.lastChild);
        }
    }

    resumeBtn.addEventListener('click', () => {
        resultBox.style.display = 'none';
        resumeBtn.style.display = 'none';
        isScanning = true;
        html5QrcodeScanner.render(onScanSuccess);
    });

    html5QrcodeScanner.render(onScanSuccess);
</script>
{% endblock %}
