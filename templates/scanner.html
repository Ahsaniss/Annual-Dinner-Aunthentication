{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center g-0 g-md-4">
    <div class="col-12 col-md-8 px-2">
        <div class="d-flex align-items-center justify-content-center mb-4 gap-2">
            <h2 class="mb-0">Gate:</h2>
            <span class="badge {{ 'bg-success' if gate_type == 'IN' else 'bg-danger' }} fs-5 px-3">{{ gate_type
                }}</span>
        </div>

        <div class="scanner-container shadow-sm p-1 p-md-3 bg-white rounded-4 border">
            <div id="reader"></div>
        </div>

        <div id="result-box" class="result-box shadow-lg" style="display: none;">
            <div id="status-icon" class="mb-3">
                <i class="bi bi-check-circle-fill display-1 text-success" id="allow-icon" style="display:none;"></i>
                <i class="bi bi-x-circle-fill display-1 text-danger" id="decline-icon" style="display:none;"></i>
            </div>
            <h1 id="result-title" class="fw-bold mb-0"></h1>
            <h4 id="result-subtitle" class="text-muted mb-4"></h4>

            <div id="student-details" style="display:none;"
                class="bg-white p-3 rounded-4 mb-4 text-start border shadow-sm">
                <div class="row g-2">
                    <div class="col-12 border-bottom pb-2">
                        <small class="text-muted d-block">NAME</small>
                        <span id="student-name" class="fw-bold fs-5"></span>
                    </div>
                    <div class="col-6 border-bottom pb-2">
                        <small class="text-muted d-block">STUDENT ID</small>
                        <span id="student-id" class="fw-bold"></span>
                    </div>
                    <div class="col-6 border-bottom pb-2">
                        <small class="text-muted d-block">REG NO</small>
                        <span id="student-reg" class="fw-bold"></span>
                    </div>
                    <div class="col-12">
                        <small class="text-muted d-block">SECTION</small>
                        <span id="student-section" class="fw-bold"></span>
                    </div>
                </div>
            </div>

            <button id="resume-btn" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm"
                style="display:none;">
                <i class="bi bi-camera me-2"></i> SCAN NEXT
            </button>
        </div>

        <div class="mt-4 px-1">
            <h6 class="fw-bold mb-3 d-flex align-items-center text-muted text-uppercase">
                <i class="bi bi-clock-history me-2"></i> Recent Entries
            </h6>
            <div id="recent-scans" class="list-group list-group-flush rounded-4 overflow-hidden border">
                <!-- Recent scans will appear here -->
                <div class="list-group-item text-center text-muted py-4 small" id="no-scans-msg">
                    No entries in this session.
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const resultBox = document.getElementById('result-box');
    const resultTitle = document.getElementById('result-title');
    const resultSubtitle = document.getElementById('result-subtitle');
    const studentDetails = document.getElementById('student-details');
    const resumeBtn = document.getElementById('resume-btn');
    const allowIcon = document.getElementById('allow-icon');
    const declineIcon = document.getElementById('decline-icon');

    let isScanning = true;
    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", { fps: 10, qrbox: 250 });

    function onScanSuccess(decodedText, decodedResult) {
        if (!isScanning) return;
        isScanning = false;

        // Stop scanning temporarily
        html5QrcodeScanner.clear();

        // Send to backend
        fetch('/api/verify', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                ticket_id: decodedText,
                gate_type: 'IN' // Always IN now
            }),
        })
            .then(response => response.json())
            .then(data => {
                showResult(data);
            })
            .catch((error) => {
                console.error('Error:', error);
                showResult({ status: 'error', message: 'Network or Server Error' });
            });
    }

    function showResult(data) {
        resultBox.style.display = 'block';
        studentDetails.style.display = 'none';
        resumeBtn.style.display = 'inline-block';
        allowIcon.style.display = 'none';
        declineIcon.style.display = 'none';

        resultBox.className = 'result-box p-4 rounded-4 text-center'; // Reset classes

        if (data.status === 'valid') {
            resultBox.classList.add('bg-success', 'bg-opacity-10', 'border-success');
            allowIcon.style.display = 'inline-block';
            resultTitle.innerText = 'ALLOW';
            resultTitle.className = 'fw-bold mb-0 text-success display-4';
            resultSubtitle.innerText = 'Access Granted';

            if (data.student) {
                studentDetails.style.display = 'block';
                document.getElementById('student-name').innerText = data.student.name;
                document.getElementById('student-id').innerText = data.student.student_id;
                document.getElementById('student-reg').innerText = data.student.reg_no;
                document.getElementById('student-section').innerText = data.student.section;

                // Add to recent scans
                addToRecentScans(data.student.name, data.student.reg_no, 'ALLOW');
            }
        } else {
            resultBox.classList.add('bg-danger', 'bg-opacity-10', 'border-danger');
            declineIcon.style.display = 'inline-block';
            resultTitle.innerText = 'DECLINE';
            resultTitle.className = 'fw-bold mb-0 text-danger display-4';

            if (data.status === 'already_used') {
                resultSubtitle.innerText = 'ALREADY ENTERED';
                if (data.student) {
                    studentDetails.style.display = 'block';
                    document.getElementById('student-name').innerText = data.student.name;
                    document.getElementById('student-id').innerText = data.student.student_id;
                    document.getElementById('student-reg').innerText = data.student.reg_no;
                    document.getElementById('student-section').innerText = data.student.section;
                }
            } else if (data.status === 'invalid') {
                resultSubtitle.innerText = 'Invalid Ticket';
            } else {
                resultSubtitle.innerText = data.message || 'Error occurred';
            }

            addToRecentScans(data.student ? data.student.name : 'Unknown', 'DECLINED', 'DECLINE');
        }
    }

    function addToRecentScans(name, reg, type) {
        const list = document.getElementById('recent-scans');
        const noScansMsg = document.getElementById('no-scans-msg');
        if (noScansMsg) noScansMsg.remove();

        const item = document.createElement('div');
        item.className = 'list-group-item d-flex justify-content-between align-items-center animate-fade-in';

        let badgeClass = 'bg-success';
        if (type === 'warning') badgeClass = 'bg-warning text-dark';
        if (type === 'error') badgeClass = 'bg-danger';

        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        item.innerHTML = `
            <div>
                <div class="fw-bold">${name}</div>
                <small class="text-muted">${reg}</small>
            </div>
            <div class="text-end">
                <span class="badge ${badgeClass} mb-1">${type.toUpperCase()}</span>
                <div class="small text-muted">${time}</div>
            </div>
        `;

        list.prepend(item);

        // Keep only last 10
        if (list.children.length > 10) {
            list.removeChild(list.lastChild);
        }
    }

    resumeBtn.addEventListener('click', () => {
        resultBox.style.display = 'none';
        resumeBtn.style.display = 'none';
        isScanning = true;
        html5QrcodeScanner.render(onScanSuccess);
    });

    html5QrcodeScanner.render(onScanSuccess);
</script>
{% endblock %}
